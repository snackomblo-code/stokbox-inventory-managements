<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - {{ app_name }}</title>
    <link rel="icon" href="{{ app_favicon }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-brand">
                {% if app_logo %}
                <img src="{{ app_logo }}" alt="Logo" class="auth-logo">
                {% else %}
                <img src="/logo.png" alt="Logo" class="auth-logo">
                {% endif %}
                <h1>{{ app_name }}</h1>
                <p class="auth-tagline">{{ app_tagline }}</p>
            </div>
            <form id="form-login" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <div class="input-group">
                        <i class="bi bi-envelope"></i>
                        <input type="email" id="email" name="email" required placeholder="nama@perusahaan.com" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <i class="bi bi-lock"></i>
                        <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="btn-toggle-pass" id="btn-toggle-pass" title="Tampilkan password">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div id="login-error" class="alert alert-danger py-2 px-3 d-none"></div>
                <button type="submit" class="btn btn-primary btn-block" id="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> Masuk
                </button>
            </form>
        </div>
    </div>
    <script src="/static/js/api.js?v=4"></script>
    <script>
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('login-error');
            errEl.classList.add('d-none');
            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Memproses...';
            try {
                const data = await api.post('/auth/login', {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                });
                localStorage.setItem('auth_user', JSON.stringify(data.user));
                window.location.href = '/dashboard';
            } catch (err) {
                errEl.textContent = err.message || 'Login gagal.';
                errEl.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Masuk';
            }
        });
        document.getElementById('btn-toggle-pass').addEventListener('click', () => {
            const inp = document.getElementById('password');
            const icon = document.querySelector('#btn-toggle-pass i');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('bi-eye');
            icon.classList.toggle('bi-eye-slash');
        });
    </script>
</body>
</html>
