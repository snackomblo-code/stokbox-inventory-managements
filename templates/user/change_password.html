{% extends "base.html" %}
{% block title %}Ganti Password{% endblock %}
{% block page_title %}Ganti Password{% endblock %}
{% block page_action %}
<a href="/profile" class="btn btn-light"><i class="bi bi-arrow-left"></i> Kembali</a>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="panel">
            <div class="panel-header">
                <h6 class="panel-title">Ubah Password Anda</h6>
            </div>
            <div class="panel-body">
                <form id="formPwd">
                    <div class="mb-3">
                        <label class="form-label">Password Lama <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="fieldLama" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password Baru <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="fieldBaru" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Konfirmasi Password Baru <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="fieldKonfirm" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-save"></i> Simpan Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('formPwd').addEventListener('submit', async (e) => {
    e.preventDefault();
    const lama = document.getElementById('fieldLama').value;
    const baru = document.getElementById('fieldBaru').value;
    const konfirm = document.getElementById('fieldKonfirm').value;
    if (baru !== konfirm) { toast('Validasi', 'Password baru dan konfirmasi tidak cocok', 'warning'); return; }
    try {
        await api.put('/api/user/change-password', { old_password: lama, new_password: baru, confirm_password: konfirm });
        toast('Berhasil', 'Password diperbarui. Silakan login ulang.', 'success');
        setTimeout(async () => { try { await api.post('/auth/logout'); } catch {} window.location.href = '/login'; }, 1500);
    } catch (err) { toast('Gagal', err.message, 'danger'); }
});
</script>
{% endblock %}
