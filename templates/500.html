<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kesalahan Server - {{ APP.name }}</title>
    <link rel="icon" href="{{ app_favicon }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-wrap">
        <div class="auth-card text-center" style="max-width: 400px;">
            <div class="auth-brand mb-4">
                {% if app_logo %}
                <img src="{{ app_logo }}" alt="Logo" class="auth-logo">
                {% else %}
                <img src="/logo.png" alt="Logo" class="auth-logo">
                {% endif %}
                <h1>{{ APP.name }}</h1>
            </div>

            <div class="error-display mb-4">
                <span class="error-code">500</span>
            </div>

            <h2 class="h4 mb-3">Kesalahan Server Internal</h2>
            <p class="text-secondary mb-4">
                Maaf, terjadi kesalahan tak terduga pada server kami.
                {% if detail %}<br><small class="text-muted">{{ detail }}</small>{% endif %}
            </p>

            <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
                <a href="/dashboard" class="btn btn-primary">
                    <i class="bi bi-house-door"></i> Coba Kembali ke Dashboard
                </a>
                <button class="btn btn-outline-secondary" onclick="window.location.reload()">
                    <i class="bi bi-arrow-clockwise"></i> Muat Ulang Halaman
                </button>
            </div>

            <hr class="my-4">
            <p class="text-muted small mb-0">
                Tim teknis kami telah diberitahu. Silakan coba beberapa saat lagi.
            </p>
        </div>
    </div>
</body>
</html>
